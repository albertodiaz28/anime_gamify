services:
  postgres:
    image: postgres:16-alpine
    container_name: anime_gamify_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-anime}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anime}
      POSTGRES_DB: ${DB_NAME:-anime_gamify}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anime}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: anime_gamify_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
